<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Roster Admin · Pool Cabin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F4F1;color:#0A1A0F;min-height:100vh;}

/* Passcode */
#lock{position:fixed;inset:0;background:#0F2920;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#lock-logo{color:rgba(255,255,255,.5);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
#lock h2{color:rgba(255,255,255,.6);font-size:11px;letter-spacing:3px;text-transform:uppercase;}
#lock-dots{display:flex;gap:14px;}
.l-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .15s;}
.l-dot.filled{background:#fff;border-color:#fff;transform:scale(1.1);}
#lock-err{color:#FCA5A5;font-size:11px;letter-spacing:1px;height:16px;text-align:center;}
#lock-pad{display:grid;grid-template-columns:repeat(3,64px);gap:10px;}
.l-key{width:64px;height:64px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;}
.l-key:active{background:rgba(255,255,255,.25);}

/* Layout */
.topbar{background:#0F2920;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;flex-direction:column;}
.topbar-title{color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;}
.topbar-sub{color:rgba(255,255,255,.4);font-size:9px;letter-spacing:1px;margin-top:1px;}
.save-btn{background:#00A84F;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-weight:700;font-size:11px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.save-btn:hover{background:#008f42;}
.save-btn:active{transform:scale(.97);}
.save-btn.saving{background:#555;pointer-events:none;}

.controls{background:#fff;border-bottom:1px solid #E2E8E4;padding:10px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select{border:1px solid #CBD5E1;border-radius:5px;padding:6px 10px;font-size:12px;background:#fff;color:#0A1A0F;cursor:pointer;}
.status-msg{font-size:11px;color:#4A7A58;letter-spacing:.5px;margin-left:auto;}

.main{padding:16px 20px;}

/* Table */
.crew-block{margin-bottom:16px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(10,26,15,.08);}
.crew-hd{background:#0F2920;color:#fff;padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:2px;display:flex;align-items:center;justify-content:space-between;}
.crew-count{background:rgba(255,255,255,.15);border-radius:10px;padding:1px 8px;font-size:9px;}
.tbl-wrap{overflow-x:auto;}
.roster-table{width:100%;border-collapse:collapse;font-size:11px;}
.roster-table th{background:#F8FAF9;padding:4px 5px;text-align:center;font-weight:700;font-size:9px;letter-spacing:1px;color:#4A7A58;border-bottom:2px solid #E2E8E4;white-space:nowrap;}
.roster-table th.name-col{text-align:left;min-width:140px;}
.roster-table th.prn-col{min-width:80px;}
.roster-table td{padding:2px 3px;border-bottom:1px solid #F0F4F1;text-align:center;vertical-align:middle;}
.roster-table td.name-td{text-align:left;padding-left:10px;font-weight:600;white-space:nowrap;}
.roster-table td.prn-td{color:#64748B;font-size:10px;white-space:nowrap;}
.roster-table tr:hover td{background:#F8FAF9;}
.day-th.weekend{color:#DC2626;}

.day-inp{width:26px;height:22px;border:1px solid transparent;border-radius:3px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;background:transparent;color:#1A1A1A;text-transform:uppercase;padding:0;}
.day-inp:focus{outline:2px solid #0F2920;}

.add-row{padding:8px 14px;border-top:1px solid #F0F4F1;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.add-row input{border:1px solid #CBD5E1;border-radius:4px;padding:5px 8px;font-size:11px;}
.add-btn{background:#0F2920;color:#fff;border:none;border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer;white-space:nowrap;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F2920;color:#fff;padding:8px 20px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;}
.toast.show{opacity:1;}

/* SHC */
.c-D{background:#FEF3C7;} .c-T{background:#DBEAFE;} .c-G{background:#D1FAE5;}
.c-R{background:#CBD5E1;} .c-H{background:#DDD6FE;} .c-V{background:#E0F2FE;}
.c-SL{background:#FFE4E6;} .c-A{background:#1F2937;color:#fff!important;}
.c-OT{background:#FED7AA;} .c-TR{background:#C4B5FD;} .c-OS{background:#E0E7FF;}
.c-CT{background:#D9F99D;}
</style>
</head>
<body>

<div id="lock">
  <div id="lock-logo">Pool Cabin Maintenance</div>
  <h2>ROSTER ADMIN</h2>
  <div id="lock-dots">
    <div class="l-dot" id="d0"></div>
    <div class="l-dot" id="d1"></div>
    <div class="l-dot" id="d2"></div>
  </div>
  <div id="lock-err"></div>
  <div id="lock-pad">
    <button class="l-key" onclick="lk('1')">1</button>
    <button class="l-key" onclick="lk('2')">2</button>
    <button class="l-key" onclick="lk('3')">3</button>
    <button class="l-key" onclick="lk('4')">4</button>
    <button class="l-key" onclick="lk('5')">5</button>
    <button class="l-key" onclick="lk('6')">6</button>
    <button class="l-key" onclick="lk('7')">7</button>
    <button class="l-key" onclick="lk('8')">8</button>
    <button class="l-key" onclick="lk('9')">9</button>
    <button class="l-key" onclick="lk('del')" style="font-size:14px;">⌫</button>
    <button class="l-key" onclick="lk('0')">0</button>
    <button class="l-key" style="opacity:0;pointer-events:none;"></button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">ROSTER ADMIN</div>
      <div class="topbar-sub">Pool Cabin Maintenance</div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveToGitHub()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      SAVE
    </button>
  </div>

  <div class="controls">
    <select id="month-sel" onchange="render()"></select>
    <select id="crew-sel" onchange="render()"><option value="">ALL CREWS</option></select>
    <span class="status-msg" id="status-msg">Loading...</span>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PC = '651';
const REPO = 'Aviproject-bit/ACFT-Project';
const FILE = 'Shift_Log.html';
const SHC = {D:'FEF3C7',T:'DBEAFE',G:'D1FAE5',R:'CBD5E1',H:'DDD6FE',V:'E0F2FE',
  'S/L':'FFE4E6',A:'1F2937',OT:'FED7AA',TR:'C4B5FD',OS:'E0E7FF','C/T':'D9F99D'};

let ROSTER={}, _pin='', _dirty=false, _sha='', _raw='', _token='';

// ── GET TOKEN FROM localStorage ──────────────────────
function getToken(){
  let t = localStorage.getItem('_radmin_token')||'';
  if(!t){
    t = prompt('Enter GitHub Token:','');
    if(t) localStorage.setItem('_radmin_token', t);
  }
  return t;
}

// ── PASSCODE ──────────────────────────────────────────
function lk(k){
  if(k==='del') _pin=_pin.slice(0,-1);
  else if(_pin.length<3) _pin+=k;
  [0,1,2].forEach(i=>{const d=document.getElementById('d'+i);d.className='l-dot'+(_pin.length>i?' filled':'');});
  if(_pin.length===3){
    if(_pin===PC){
      const scr=document.getElementById('lock');
      scr.style.transition='opacity .3s';scr.style.opacity='0';
      setTimeout(()=>{scr.style.display='none';document.getElementById('app').style.display='';},300);
      _token=getToken();
      init();
    } else {
      document.getElementById('lock-err').textContent='INCORRECT PASSCODE';
      [0,1,2].forEach(i=>document.getElementById('d'+i).style.background='#FCA5A5');
      setTimeout(()=>{_pin='';[0,1,2].forEach(i=>{document.getElementById('d'+i).className='l-dot';document.getElementById('d'+i).style.background='';});document.getElementById('lock-err').textContent='';},700);
    }
  }
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('lock').style.display==='none') return;
  if(e.key>='0'&&e.key<='9') lk(e.key);
  else if(e.key==='Backspace') lk('del');
});

// ── INIT ──────────────────────────────────────────────
async function init(){
  status('Loading roster...');
  try{
    const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      headers:{'Authorization':`token ${_token}`,'User-Agent':'roster-admin'}
    });
    if(!res.ok) throw new Error('Auth failed — check token');
    const data=await res.json();
    _sha=data.sha;
    _raw=decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));

    // Extract ROSTER
    const start=_raw.indexOf('let ROSTER = {');
    let i=start+13, depth=0, end=-1;
    while(i<_raw.length){
      if(_raw[i]==='{') depth++;
      else if(_raw[i]==='}'){depth--;if(depth===0){end=i+1;break;}}
      i++;
    }
    ROSTER=JSON.parse(_raw.slice(start+13,end));

    buildMonthSel();
    buildCrewSel();
    render();
    status('Ready');
  }catch(e){
    status('Error: '+e.message);
    showToast('Error: '+e.message);
    localStorage.removeItem('_radmin_token');
  }
}

function buildMonthSel(){
  const months=new Set();
  Object.values(ROSTER).flat().forEach(m=>Object.keys(m.schedule||{}).forEach(d=>months.add(d.slice(0,7))));
  const now=new Date();
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);months.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
  const sorted=[...months].sort();
  const cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('month-sel').innerHTML=sorted.map(m=>`<option value="${m}"${m===cur?' selected':''}>${ml(m)}</option>`).join('');
}

function buildCrewSel(){
  document.getElementById('crew-sel').innerHTML='<option value="">ALL CREWS</option>'+
    Object.keys(ROSTER).map(c=>`<option value="${c}">${c}</option>`).join('');
}

function ml(ym){const[y,m]=ym.split('-');return['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][+m]+' '+y;}

// ── RENDER ────────────────────────────────────────────
function render(){
  const ym=document.getElementById('month-sel').value;
  const cf=document.getElementById('crew-sel').value;
  if(!ym||!Object.keys(ROSTER).length) return;
  const[yr,mo]=ym.split('-').map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const days=[...Array(dim)].map((_,i)=>i+1);
  const main=document.getElementById('main');
  main.innerHTML='';

  const crews=cf?[cf]:Object.keys(ROSTER);
  crews.forEach(cn=>{
    const members=getCrewMonth(cn,ym);
    if(!members.length) return;
    const block=document.createElement('div');
    block.className='crew-block';
    block.innerHTML=`<div class="crew-hd"><span>${cn}</span><span class="crew-count">${members.length}</span></div>`;
    const wrap=document.createElement('div');
    wrap.className='tbl-wrap';
    const tbl=document.createElement('table');
    tbl.className='roster-table';
    const dnames=['S','M','T','W','T','F','S'];
    let th=`<thead><tr><th class="name-col">#&nbsp;NAME</th><th class="prn-col">PRN</th>`;
    days.forEach(d=>{const dow=new Date(yr,mo-1,d).getDay();const we=dow===5||dow===6;th+=`<th class="day-th${we?' weekend':''}">${d}<br><span style="font-size:7px;font-weight:400;">${dnames[dow]}</span></th>`;});
    th+='</tr></thead>';
    tbl.innerHTML=th;
    const tbody=document.createElement('tbody');
    members.forEach((m,i)=>{
      const tr=document.createElement('tr');
      let html=`<td class="name-td">${i+1}. ${m.name}</td><td class="prn-td">${m.prn}</td>`;
      days.forEach(d=>{
        const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const code=(m.schedule||{})[ds]||'';
        const bg=SHC[code]||'';
        html+=`<td style="${bg?'background:#'+bg+';':''}"><input class="day-inp" type="text" maxlength="3" value="${code}" data-prn="${m.prn}" data-date="${ds}" onchange="cellChange(this)" oninput="this.value=this.value.toUpperCase()"></td>`;
      });
      tr.innerHTML=html;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    block.appendChild(wrap);
    // Add row
    const id=cn.replace(/\s/g,'-');
    const ar=document.createElement('div');
    ar.className='add-row';
    ar.innerHTML=`<input type="text" placeholder="PRN" id="ap-${id}" style="width:90px"><input type="text" placeholder="Name" id="an-${id}" style="width:150px"><input type="text" placeholder="POS" id="ao-${id}" style="width:70px"><button class="add-btn" onclick="addMember('${cn}')">+ ADD</button>`;
    block.appendChild(ar);
    main.appendChild(block);
  });
}

function getCrewMonth(cn,ym){
  const r=[];
  Object.entries(ROSTER).forEach(([pc,ms])=>ms.forEach(m=>{
    const tc=(m.crewByMonth||{})[ym]||pc;
    if(tc===cn) r.push(m);
  }));
  return r.sort((a,b)=>((a.crewByMonthOrder||{})[ym]??999)-((b.crewByMonthOrder||{})[ym]??999));
}

// ── EDIT ─────────────────────────────────────────────
function cellChange(inp){
  const prn=inp.dataset.prn, date=inp.dataset.date, code=inp.value.trim().toUpperCase();
  Object.values(ROSTER).flat().forEach(m=>{
    if(m.prn===prn){if(code) m.schedule[date]=code; else delete m.schedule[date];}
  });
  const bg=SHC[code]||'';
  inp.closest('td').style.background=bg?'#'+bg:'';
  _dirty=true; status('Unsaved changes...');
}

function addMember(crew){
  const id=crew.replace(/\s/g,'-');
  const prn=document.getElementById('ap-'+id).value.trim();
  const name=document.getElementById('an-'+id).value.trim().toUpperCase();
  const pos=document.getElementById('ao-'+id).value.trim().toUpperCase();
  if(!prn||!name){showToast('Enter PRN and Name');return;}
  ROSTER[crew]=ROSTER[crew]||[];
  ROSTER[crew].push({prn,name,pos,schedule:{}});
  _dirty=true; render(); showToast('Member added');
}

// ── SAVE ─────────────────────────────────────────────
async function saveToGitHub(){
  if(!_dirty){showToast('No changes to save');return;}
  const btn=document.getElementById('save-btn');
  btn.className='save-btn saving'; btn.textContent='SAVING...';
  status('Saving...');
  try{
    const newJson=JSON.stringify(ROSTER,null,0);
    // Replace ROSTER in raw file
    const start=_raw.indexOf('let ROSTER = {');
    let i=start+13, depth=0, end=-1;
    while(i<_raw.length){
      if(_raw[i]==='{') depth++;
      else if(_raw[i]==='}'){depth--;if(depth===0){end=i+1;break;}}
      i++;
    }
    const newRaw=_raw.slice(0,start+13)+newJson+_raw.slice(end);

    // Encode safely
    const bytes=new TextEncoder().encode(newRaw);
    let b64='';
    const chunk=8192;
    for(let i=0;i<bytes.length;i+=chunk){
      b64+=String.fromCharCode(...bytes.slice(i,i+chunk));
    }
    const encoded=btoa(b64);

    const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      method:'PUT',
      headers:{'Authorization':`token ${_token}`,'Content-Type':'application/json','User-Agent':'roster-admin'},
      body:JSON.stringify({message:'roster: admin update',content:encoded,sha:_sha})
    });
    const data=await res.json();
    if(data.commit){
      _sha=data.content.sha; _raw=newRaw; _dirty=false;
      showToast('Saved ✓'); status('Saved ✓');
    } else throw new Error(data.message||'Failed');
  }catch(e){
    showToast('Error: '+e.message); status('Save failed');
    console.error(e);
  }
  btn.className='save-btn';
  btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> SAVE';
}

function status(m){document.getElementById('status-msg').textContent=m;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(()=>t.className='toast',2500);}
</script>
</body>
</html>
