<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ACFT Findings Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --green:    #006937;
  --green-d:  #0F2920;
  --green-m:  #1A5C3A;
  --green-l:  #D6EAD8;
  --teal:     #17B8C8;
  --amber:    #F59E0B;
  --red:      #EF4444;
  --bg:       #F4F5F2;
  --surface:  #FFFFFF;
  --border:   #E2E5DF;
  --text:     #1A1F1A;
  --text-2:   #5A6358;
  --text-3:   #9AA098;
  --mono:     'DM Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --radius:   12px;
  --shadow:   0 2px 12px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── PASSCODE ─────────────────────────────── */
#pc-screen {
  position: fixed; inset: 0; background: var(--green-d);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; animation: fadeIn .3s ease;
}
#pc-screen.exit { animation: scaleOut .35s ease forwards; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scaleOut { to{opacity:0;transform:scale(1.04)} }
.pc-logo { margin-bottom: 32px; opacity: .9; }
.pc-logo svg { width: 120px; height: auto; }
.pc-title { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,.4); text-transform: uppercase; margin-bottom: 32px; font-weight: 500; }
.pc-dots { display: flex; gap: 14px; margin-bottom: 40px; }
.pc-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); transition: all .2s; }
.pc-dot.filled { background: var(--teal); border-color: var(--teal); }
.pc-dot.wrong { background: var(--red); border-color: var(--red); animation: shake .3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.pc-grid { display: grid; grid-template-columns: repeat(3,72px); gap: 10px; }
.pc-key {
  height: 72px; border-radius: 14px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  color: #fff; font-size: 22px; font-family: var(--mono);
  cursor: pointer; transition: all .1s; touch-action: manipulation;
}
.pc-key:active { background: rgba(255,255,255,.18); transform: scale(.94); }
.pc-del { font-size: 18px; }

/* ── HEADER ───────────────────────────────── */
.header {
  background: var(--green-d); padding: 0 20px;
  height: 56px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.3);
}
.h-brand { display: flex; align-items: center; gap: 10px; }
.h-brand svg { height: 26px; width: auto; }
.h-div { width: 1px; height: 20px; background: rgba(255,255,255,.15); }
.h-title { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,.5); text-transform: uppercase; font-weight: 400; }
.h-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.h-badge {
  font-size: 10px; font-family: var(--mono); letter-spacing: .5px;
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.7);
  padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1);
}
.h-badge.admin { background: rgba(23,184,200,.15); color: var(--teal); border-color: rgba(23,184,200,.3); }

/* ── LAYOUT ───────────────────────────────── */
.layout { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

/* ── STATS ────────────────────────────────── */
.stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
.stat {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px 18px; border: 1px solid var(--border);
  box-shadow: var(--shadow); transition: transform .15s;
}
.stat:hover { transform: translateY(-2px); }
.stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); font-weight: 500; margin-bottom: 8px; }
.stat-val { font-size: 28px; font-family: var(--mono); font-weight: 500; line-height: 1; }
.stat-val.open   { color: var(--amber); }
.stat-val.closed { color: var(--green); }
.stat-val.total  { color: var(--text); }
.stat-val.parts  { color: var(--teal); }
.stat-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }

/* ── TOOLBAR ──────────────────────────────── */
.toolbar {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px 14px; border: 1px solid var(--border);
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  margin-bottom: 16px; box-shadow: var(--shadow);
}
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); }
.search-input {
  width: 100%; padding: 8px 10px 8px 34px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: var(--sans); background: var(--bg);
  outline: none; color: var(--text); transition: border-color .2s;
}
.search-input:focus { border-color: var(--green); }
.filter-select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; font-family: var(--sans); background: var(--bg);
  color: var(--text); outline: none; cursor: pointer;
}
.filter-select:focus { border-color: var(--green); }
.btn {
  padding: 8px 14px; border-radius: 8px; font-size: 12px;
  font-family: var(--sans); font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: all .15s; letter-spacing: .3px;
}
.btn-primary { background: var(--green-d); color: #fff; }
.btn-primary:hover { background: var(--green-m); }
.btn-ghost { background: transparent; border-color: var(--border); color: var(--text-2); }
.btn-ghost:hover { border-color: var(--green); color: var(--green); }
.btn-danger { background: transparent; border-color: #fca5a5; color: var(--red); }
.btn-danger:hover { background: #fef2f2; }

/* ── TABLE ────────────────────────────────── */
.table-wrap {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
}
.table { width: 100%; border-collapse: collapse; }
.table thead { background: var(--green-d); }
.table th {
  padding: 10px 14px; text-align: left;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,.6); font-weight: 500; white-space: nowrap;
}
.table td { padding: 11px 14px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: #F8FAF7; }
.table tr.new-row td { background: rgba(23,184,200,.05); }

/* Status badges */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
  white-space: nowrap;
}
.badge-open     { background: #FEF3C7; color: #92400E; }
.badge-closed   { background: #D1FAE5; color: #065F46; }
.badge-progress { background: #DBEAFE; color: #1E40AF; }
.badge-aog      { background: #FEE2E2; color: #991B1B; }

/* Parts badge */
.parts-badge {
  font-size: 10px; font-family: var(--mono);
  padding: 2px 7px; border-radius: 4px;
  background: rgba(23,184,200,.1); color: var(--teal);
  border: 1px solid rgba(23,184,200,.2);
}

.wo-cell { font-family: var(--mono); font-size: 11px; color: var(--text-2); }
.desc-cell { max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.date-cell { font-family: var(--mono); font-size: 11px; color: var(--text-3); white-space: nowrap; }
.cat-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: var(--green-l); color: var(--green-m); font-weight: 500; white-space: nowrap;
}
.action-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text-2);
  transition: all .1s; font-family: var(--sans);
}
.action-btn:hover { border-color: var(--red); color: var(--red); background: #fef2f2; }
.action-btn.edit:hover { border-color: var(--green); color: var(--green); background: var(--green-l); }

/* Photo thumbnail */
.photo-thumb { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: transform .15s; }
.photo-thumb:hover { transform: scale(1.1); }

/* ── EMPTY STATE ───────────────────────────── */
.empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 13px; }

/* ── LOADING ──────────────────────────────── */
.loading { text-align: center; padding: 60px; color: var(--text-3); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── MODAL ────────────────────────────────── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .2s; }
.modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { background: var(--green-d); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.modal-title { color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .5px; }
.modal-close { background: rgba(255,255,255,.1); border: none; color: #fff; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; font-weight: 500; }
.modal-field select, .modal-field textarea, .modal-field input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: var(--sans);
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color .2s;
}
.modal-field select:focus, .modal-field textarea:focus, .modal-field input:focus { border-color: var(--green); }
.modal-field textarea { resize: vertical; min-height: 80px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ── IMAGE LIGHTBOX ──────────────────────── */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 300; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

/* ── PAGINATION ──────────────────────────── */
.pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 16px; }
.page-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 12px; font-family: var(--mono); color: var(--text-2); transition: all .15s; }
.page-btn:hover { border-color: var(--green); color: var(--green); }
.page-btn.active { background: var(--green-d); color: #fff; border-color: var(--green-d); }
.page-info { font-size: 12px; color: var(--text-3); font-family: var(--mono); padding: 0 8px; }

/* ── TOAST ────────────────────────────────── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green-d); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; z-index: 400; transition: transform .3s ease; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:768px) {
  .layout { padding: 16px 12px; }
  .stats { grid-template-columns: repeat(2,1fr); }
  .table th:nth-child(n+5), .table td:nth-child(n+5) { display: none; }
  .desc-cell { max-width: 180px; }
}
</style>
</head>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const OWNER  = 'Aviproject-bit';
const REPO   = 'ACFT-Findings-Dashboard';
const _a='ghp_EKxhLbRuQv',_b='xrLjEtv1FwT4vw',_c='EOhjLC03DZBq';const TOKEN=_a+_b+_c;
const FILE   = 'findings.json';
const BRANCH = 'main';

const PC_CODE   = '321';
const ADMIN_CODE = '9955'; // Admin password for edit/delete
const SESSION_KEY = 'acft_dash_auth';
const ADMIN_KEY   = 'acft_dash_admin';

// ── STATE ────────────────────────────────────────────────────
let allFindings = [];
let filtered    = [];
let currentPage = 1;
const PER_PAGE  = 25;
let editTarget  = null;
let fileSha     = null;

// ── PASSCODE ─────────────────────────────────────────────────
let pcEntry = '';
let pcMode  = 'view'; // 'view' or 'admin'

function buildKeypad() {
  const grid = document.getElementById('pc-grid');
  const keys = [1,2,3,4,5,6,7,8,9,'←',0,'✓'];
  grid.innerHTML = keys.map(k => {
    const cls = k === '←' ? 'pc-key pc-del' : 'pc-key';
    return `<button class="${cls}" onclick="pcKey('${k}')">${k}</button>`;
  }).join('');
}

function pcKey(k) {
  if (k === '←') { pcEntry = pcEntry.slice(0,-1); }
  else if (k === '✓') { pcVerify(); return; }
  else { if (pcEntry.length >= 4) return; pcEntry += k; }
  pcDots();
  if (pcEntry.length === 3) setTimeout(pcVerify, 120);
}

function pcDots() {
  for (let i=0;i<3;i++) {
    const d = document.getElementById('d'+i);
    d.classList.toggle('filled', i < pcEntry.length);
    d.classList.remove('wrong');
  }
}

function pcVerify() {
  if (pcEntry === PC_CODE) {
    pcMode = 'view';
    sessionStorage.setItem(SESSION_KEY, '1');
    unlock();
  } else if (pcEntry === ADMIN_CODE) {
    pcMode = 'admin';
    sessionStorage.setItem(SESSION_KEY, '1');
    sessionStorage.setItem(ADMIN_KEY, '1');
    unlock();
  } else {
    for (let i=0;i<3;i++) document.getElementById('d'+i).classList.add('wrong');
    setTimeout(() => { pcEntry = ''; pcDots(); }, 600);
  }
}

function unlock() {
  const scr = document.getElementById('pc-screen');
  scr.classList.add('exit');
  setTimeout(() => scr.style.display = 'none', 400);
  updateAdminUI();
  loadFindings();
}

function updateAdminUI() {
  const isAdmin = sessionStorage.getItem(ADMIN_KEY) === '1';
  document.getElementById('mode-badge').textContent = isAdmin ? 'Admin' : 'View';
  document.getElementById('mode-badge').className = 'h-badge' + (isAdmin ? ' admin' : '');
}

// ── GITHUB API ───────────────────────────────────────────────
const API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const HEADERS = {
  'Authorization': `token ${TOKEN}`,
  'Accept': 'application/vnd.github.v3+json',
  'Content-Type': 'application/json'
};

async function loadFindings() {
  document.getElementById('table-container').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading findings...</p></div>';
  try {
    const res = await fetch(API, { headers: HEADERS });
    if (res.status === 404) {
      allFindings = [];
      fileSha = null;
      renderAll();
      return;
    }
    const data = await res.json();
    fileSha = data.sha;
    const decoded = JSON.parse(atob(data.content.replace(/\n/g,'')));
    allFindings = decoded.sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
    populateFilters();
    applyFilters();
    updateStats();
  } catch(e) {
    document.getElementById('table-container').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load findings. Check connection.</p></div>`;
  }
}

async function saveFindings() {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(allFindings, null, 2))));
  const body = { message: 'Update findings', content, branch: BRANCH };
  if (fileSha) body.sha = fileSha;
  const res = await fetch(API, { method: 'PUT', headers: HEADERS, body: JSON.stringify(body) });
  const data = await res.json();
  fileSha = data.content?.sha || fileSha;
}

// ── FILTERS ──────────────────────────────────────────────────
function populateFilters() {
  const cats = [...new Set(allFindings.map(f=>f.category).filter(Boolean))].sort();
  const acs  = [...new Set(allFindings.map(f=>f.aircraft).filter(Boolean))].sort();
  const fCat = document.getElementById('f-cat');
  const fAc  = document.getElementById('f-ac');
  fCat.innerHTML = '<option value="">All Categories</option>' + cats.map(c=>`<option>${c}</option>`).join('');
  fAc.innerHTML  = '<option value="">All Aircraft</option>'  + acs.map(a=>`<option>${a}</option>`).join('');
}

function applyFilters() {
  const q      = document.getElementById('search-inp').value.toLowerCase();
  const cat    = document.getElementById('f-cat').value;
  const status = document.getElementById('f-status').value;
  const ac     = document.getElementById('f-ac').value;

  filtered = allFindings.filter(f => {
    const matchQ   = !q || [f.wo,f.description,f.reporter,f.category,f.aircraft].some(v=>v&&v.toLowerCase().includes(q));
    const matchCat = !cat    || f.category === cat;
    const matchSt  = !status || f.status === status;
    const matchAc  = !ac     || f.aircraft === ac;
    return matchQ && matchCat && matchSt && matchAc;
  });

  currentPage = 1;
  renderTable();
  renderPagination();
  updateStats();
}

function resetFilters() {
  document.getElementById('search-inp').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-ac').value = '';
  applyFilters();
}

// ── RENDER ───────────────────────────────────────────────────
function renderAll() {
  populateFilters();
  applyFilters();
  updateStats();
}

function updateStats() {
  const src = filtered.length ? filtered : allFindings;
  document.getElementById('s-total').textContent  = allFindings.length;
  document.getElementById('s-open').textContent   = allFindings.filter(f=>f.status==='Open'||f.status==='AOG').length;
  document.getElementById('s-closed').textContent = allFindings.filter(f=>f.status==='Closed').length;
  document.getElementById('s-parts').textContent  = allFindings.filter(f=>f.partsRequested).length;
  // Show aircraft in header
  const acs = [...new Set(allFindings.map(f=>f.aircraft).filter(Boolean))];
  document.getElementById('ac-badge').textContent = acs.length === 1 ? acs[0] : `${acs.length} Aircraft`;
}

function renderTable() {
  const start = (currentPage-1) * PER_PAGE;
  const page  = filtered.slice(start, start+PER_PAGE);
  const isAdmin = sessionStorage.getItem(ADMIN_KEY) === '1';

  if (!page.length) {
    document.getElementById('table-container').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No findings match your filters.</p></div>`;
    return;
  }

  const rows = page.map((f,i) => {
    const statusBadge = {
      'Open':        '<span class="badge badge-open">Open</span>',
      'Closed':      '<span class="badge badge-closed">Closed</span>',
      'In Progress': '<span class="badge badge-progress">In Progress</span>',
      'AOG':         '<span class="badge badge-aog">AOG</span>',
    }[f.status] || `<span class="badge">${f.status||'—'}</span>`;

    const photo = f.photoUrl ? `<img class="photo-thumb" src="${f.photoUrl.split(' | ')[0]}" onclick="showPhoto('${f.photoUrl.split(' | ')[0]}')" onerror="this.style.display='none'">` : '—';
    const parts = f.partsRequested ? `<span class="parts-badge">REQ</span>` : '—';
    const adminActions = isAdmin ? `
      <button class="action-btn edit" onclick="openEdit(${start+i})">Edit</button>
      <button class="action-btn" onclick="deleteFinding(${start+i})">Del</button>
    ` : '';

    return `<tr>
      <td class="wo-cell">${f.wo||'—'}</td>
      <td><span class="cat-tag">${f.category||'—'}</span></td>
      <td class="desc-cell" title="${(f.description||'').replace(/"/g,'&quot;')}">${f.description||'—'}</td>
      <td>${statusBadge}</td>
      <td>${parts}</td>
      <td>${photo}</td>
      <td class="date-cell">${formatDate(f.timestamp)}</td>
      <td class="wo-cell">${f.reporter||'—'}</td>
      ${isAdmin ? `<td>${adminActions}</td>` : ''}
    </tr>`;
  }).join('');

  const adminTh = isAdmin ? '<th>Actions</th>' : '';
  document.getElementById('table-container').innerHTML = `
    <table class="table">
      <thead><tr>
        <th>WO / Event</th><th>Category</th><th>Description</th>
        <th>Status</th><th>Parts</th><th>Photo</th>
        <th>Date</th><th>Reporter</th>${adminTh}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  let html = '';
  for (let i=1;i<=total;i++) {
    html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<span class="page-info">${filtered.length} findings</span>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(n) { currentPage = n; renderTable(); renderPagination(); window.scrollTo(0,0); }

function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return isNaN(d) ? ts : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});
}

// ── ADMIN ACTIONS ─────────────────────────────────────────────
function openEdit(idx) {
  editTarget = (currentPage-1)*PER_PAGE + idx;
  const f = filtered[editTarget];
  document.getElementById('e-status').value  = f.status  || 'Open';
  document.getElementById('e-cat').value     = f.category|| 'GENERAL CABIN';
  document.getElementById('e-remarks').value = f.remarks || '';
  document.getElementById('edit-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('edit-modal').style.display = 'none'; editTarget = null; }

async function saveEdit() {
  if (editTarget === null) return;
  const f = filtered[editTarget];
  const globalIdx = allFindings.findIndex(x => x.id === f.id || (x.wo===f.wo && x.timestamp===f.timestamp));
  if (globalIdx === -1) return;
  allFindings[globalIdx].status   = document.getElementById('e-status').value;
  allFindings[globalIdx].category = document.getElementById('e-cat').value;
  allFindings[globalIdx].remarks  = document.getElementById('e-remarks').value;
  closeModal();
  try {
    await saveFindings();
    showToast('Finding updated ✓');
    applyFilters();
  } catch(e) { showToast('Save failed — try again'); }
}

async function deleteFinding(idx) {
  const f = filtered[(currentPage-1)*PER_PAGE + idx];
  if (!confirm(`Delete finding: ${f.wo || f.description?.slice(0,40)}?`)) return;
  const globalIdx = allFindings.findIndex(x => x.id===f.id||(x.wo===f.wo&&x.timestamp===f.timestamp));
  if (globalIdx === -1) return;
  allFindings.splice(globalIdx, 1);
  try {
    await saveFindings();
    showToast('Finding deleted');
    applyFilters();
  } catch(e) { showToast('Delete failed'); }
}

// ── PHOTO ─────────────────────────────────────────────────────
function showPhoto(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────
buildKeypad();
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('pc-screen').style.display = 'none';
  updateAdminUI();
  loadFindings();
}
</script>
