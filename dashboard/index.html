  --brd:#D0D7DE; --txt:#1A1F1A; --t2:#5A6358; --t3:#9AA098;
  --r:9px; --sh:0 1px 8px rgba(0,0,0,.07);
  --tf:Arial,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'BwGradual',sans-serif;background:var(--bg);color:var(--txt);}

/* PASSCODE */
#pc{position:fixed;inset:0;background:var(--gd);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .3s}
#pc.exit{animation:fadeOut .35s forwards}
#admin-pc{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;backdrop-filter:blur(4px)}
#admin-pc .pc-inner{background:var(--gd);border-radius:18px;padding:32px 24px;display:flex;flex-direction:column;align-items:center}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:scale(1.03)}}
.pc-logo{margin-bottom:24px}
.pc-logo img{height:38px;width:auto;filter:brightness(0) invert(1);opacity:.85}
.pc-title{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:24px}
.pc-dots{display:flex;gap:11px;margin-bottom:32px}
.pc-dot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:.2s}
.pc-dot.on{background:var(--teal);border-color:var(--teal)}
.pc-dot.err{background:#ef4444;border-color:#ef4444;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pc-grid{display:grid;grid-template-columns:repeat(3,66px);gap:8px}
.pc-btn{height:66px;border-radius:11px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:20px;font-family:'BwGradual',sans-serif;cursor:pointer;transition:.1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.pc-btn:active{background:rgba(255,255,255,.2);transform:scale(.93)}

/* HEADER */
.hdr{background:var(--gd);height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-logo img{height:24px;width:auto}
.hdr-div{width:1px;height:18px;background:rgba(255,255,255,.15);flex-shrink:0}
.hdr-title{font-size:8px;letter-spacing:1.8px;color:rgba(255,255,255,.4);text-transform:uppercase;flex-shrink:0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.font-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:monospace;-webkit-tap-highlight-color:transparent}
.font-btn:active{background:rgba(255,255,255,.2)}
.admin-entry-btn{background:rgba(23,184,200,.15);border:1px solid rgba(23,184,200,.3);color:var(--teal);border-radius:6px;padding:3px 10px;font-size:10px;cursor:pointer;font-family:'BwGradual',sans-serif;letter-spacing:.5px;-webkit-tap-highlight-color:transparent}
.admin-entry-btn:active{background:rgba(23,184,200,.3)}
.admin-active-badge{display:none;font-size:10px;background:rgba(23,184,200,.2);color:var(--teal);border:1px solid rgba(23,184,200,.3);border-radius:20px;padding:3px 10px}

/* LAYOUT */
.layout{max-width:1500px;margin:0 auto;padding:12px}

/* TOOLBAR */
.toolbar{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px;box-shadow:var(--sh)}
.sw{flex:1;min-width:160px;position:relative}
.sw svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.si{width:100%;padding:7px 8px 7px 28px;border:1px solid var(--brd);border-radius:7px;font-size:12px;font-family:var(--tf);background:var(--bg);color:var(--txt);outline:none}
.si:focus{border-color:var(--g)}
.fs{padding:7px 9px;border:1px solid var(--brd);border-radius:7px;font-size:12px;font-family:var(--tf);background:var(--bg);color:var(--txt);outline:none;cursor:pointer}
.fs:focus{border-color:var(--g)}
.tb{padding:7px 11px;border-radius:7px;font-size:12px;font-family:'BwGradual',sans-serif;font-weight:500;cursor:pointer;border:1px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.tg{background:transparent;border-color:var(--brd);color:var(--t2)}
.tg:hover{border-color:var(--g);color:var(--g)}
.tp{background:var(--gd);color:#fff}
.tp:active{background:#1A5C3A}
.cnt{font-size:11px;color:var(--t3);font-family:monospace;padding:0 2px;white-space:nowrap}

/* TABLE WRAPPER - key for mobile scroll */
.tw{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ts{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-family:var(--tf);min-width:900px}
thead{background:var(--gd)}
th{padding:8px 9px;text-align:left;font-size:11px;color:rgba(255,255,255,.8);font-weight:600;white-space:nowrap;overflow:hidden;position:relative;cursor:pointer;user-select:none}
th:hover{background:rgba(255,255,255,.07)}
th .sa{font-size:10px;margin-left:3px;opacity:.35}
th.asc .sa::after{content:"↑";opacity:1}
th.desc .sa::after{content:"↓";opacity:1}
td{padding:6px 9px;font-size:12px;border-bottom:1px solid #E8ECEF;vertical-align:top;line-height:1.45;word-break:break-word;white-space:pre-line}
tr:last-child td{border-bottom:none}
tbody tr:nth-child(even) td{background:#F6F8FA}
tbody tr:hover td{background:#EEF6FF!important}
td.copied{background:#D1FAE5!important;transition:background .3s}
td.editing{padding:0!important}
td.editing input,td.editing textarea{width:100%;height:100%;padding:6px 9px;border:2px solid var(--teal);border-radius:0;font-size:12px;font-family:var(--tf);background:#fff;outline:none;resize:none}

/* Col widths */
th:nth-child(1),td:nth-child(1){width:82px}
th:nth-child(2),td:nth-child(2){width:55px}
th:nth-child(3),td:nth-child(3){width:82px}
th:nth-child(4),td:nth-child(4){width:135px}
th:nth-child(5),td:nth-child(5){width:125px}
th:nth-child(6),td:nth-child(6){width:105px}
th:nth-child(7),td:nth-child(7){width:auto;min-width:180px}
th:nth-child(8),td:nth-child(8){width:140px}
th:nth-child(9),td:nth-child(9){width:90px}
th:nth-child(10),td:nth-child(10){width:75px}

/* Col resizer */
.cr{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize}
.cr:hover,.cr.on{background:rgba(255,255,255,.35)}

/* Tags */
.cat{display:inline-block;background:var(--gl);color:#1A5C3A;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;white-space:nowrap}

/* Photo */
.ph{width:65px;height:44px;object-fit:cover;border-radius:4px;border:1px solid var(--brd);cursor:zoom-in;display:block}

/* Admin row btns */
.rb{padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--t2);font-family:var(--tf);margin:1px}
.rb.e:hover{border-color:var(--g);color:var(--g);background:var(--gl)}
.rb.d:hover{border-color:#fca5a5;color:#ef4444;background:#fef2f2}
.rb.s{border-color:var(--teal);color:var(--teal)}
.rb.x{border-color:#fca5a5;color:#ef4444}

/* Empty/loading */
.empty,.loading{text-align:center;padding:50px 20px;color:var(--t3);font-size:13px}
.sp{width:28px;height:28px;border:3px solid var(--brd);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pager */
.pg{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px;flex-wrap:wrap}
.pb{width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);background:transparent;cursor:pointer;font-size:11px;font-family:monospace;color:var(--t2);transition:.15s}
.pb:hover{border-color:var(--g);color:var(--g)}
.pb.on{background:var(--gd);color:#fff;border-color:var(--gd)}
.pi{font-size:11px;color:var(--t3);font-family:monospace}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lb img{max-width:93vw;max-height:93vh;border-radius:7px}

/* Confirm Delete Modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:400; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s; }
.del-modal { background:var(--gd); border-radius:16px; width:100%; max-width:340px; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.4); text-align:center; }
.del-modal-head { background:rgba(239,68,68,.15); border-bottom:1px solid rgba(239,68,68,.2); padding:20px 24px 16px; }
.del-icon { margin-bottom:10px; }
.del-title { font-size:15px; font-weight:700; color:#fff; font-family:'BwGradual',sans-serif; letter-spacing:.3px; }
.del-modal-body { padding:16px 24px 20px; }
.del-msg { font-size:13px; color:rgba(255,255,255,.6); font-family:'BwGradual',sans-serif; line-height:1.6; }
.del-footer { padding:0 24px 20px; display:flex; gap:10px; justify-content:center; }
.del-cancel-btn { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:rgba(255,255,255,.7); }
.del-cancel-btn:hover { background:rgba(255,255,255,.15); }
.del-confirm-btn { background:#ef4444; color:#fff; border-color:#ef4444; }
.del-confirm-btn:hover { background:#dc2626; }

/* Checkboxes */
.cb-cell { width:36px!important; padding:6px 8px!important; text-align:center; }
.row-cb { width:15px; height:15px; cursor:pointer; accent-color:var(--g); }
.del-sel-btn { background:#fef2f2; border-color:#fca5a5; color:#ef4444; }
.del-sel-btn:hover { background:#fee2e2; }

/* Toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gd);color:#fff;padding:9px 18px;border-radius:9px;font-size:13px;z-index:600;transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
// CONFIG
const PROXY_URL='https://acft-proxy.aviproject.workers.dev';
const GH_API=PROXY_URL+'?path=dashboard/findings.json';
const GH_BRANCH='main';
const GH_H={'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};

const PC_VIEW='321', PC_ADMIN='9955';
const SK='acft_auth', AK='acft_admin';

// STATE
var fontSize=parseInt(localStorage.getItem('acft_fs'))||12;
var colW=JSON.parse(localStorage.getItem('acft_cw')||'{}');
var allData=[],filtered=[],pg=1,perPg=30;
var sCol='timestamp',sDir='desc';
var fileSha=null;
var selected=new Set();
var _delFn=null;

// ── PASSCODE (Main) ──────────────────────────────────────────
var mainEntry='';
function buildGrid(gridId,dotsPrefix,len,onComplete){
  const g=document.getElementById(gridId);
  g.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'⌫',0,'✓'].forEach(k=>{
    const b=document.createElement('button');
    b.className='pc-btn'; b.textContent=k;
    b.onclick=()=>pcKey(gridId,dotsPrefix,len,String(k),onComplete);
    g.appendChild(b);
  });
}

function pcKey(gid,dp,len,k,cb){
  const entry=window['_entry_'+dp]||'';
  let ne=entry;
  if(k==='⌫') ne=ne.slice(0,-1);
  else if(k==='✓'){ window['_entry_'+dp]=''; pcVerify(dp,len,entry,cb); return; }
  else{ if(ne.length>=len) return; ne+=k; }
  window['_entry_'+dp]=ne;
  updateDots(dp,len,ne);
  if(ne.length===len) setTimeout(()=>pcVerify(dp,len,ne,cb),100);
}

function updateDots(dp,len,val){
  for(let i=0;i<len;i++){
    const d=document.getElementById(dp+i);
    if(d){d.classList.toggle('on',i<val.length);d.classList.remove('err');}
  }
}

function pcVerify(dp,len,val,cb){
  window['_entry_'+dp]='';
  if(cb(val)){
    updateDots(dp,len,'');
  }else{
    for(let i=0;i<len;i++){const d=document.getElementById(dp+i);if(d)d.classList.add('err');}
    setTimeout(()=>updateDots(dp,len,''),600);
  }
}

// Main passcode (3-digit)
buildGrid('main-grid','md',3,(val)=>{
  if(val===PC_VIEW||val===PC_ADMIN){
    sessionStorage.setItem(SK,'1');
    if(val===PC_ADMIN){ sessionStorage.setItem(AK,'1'); showAdminUI(); }
    const scr=document.getElementById('pc');
    scr.classList.add('exit');
    setTimeout(()=>scr.style.display='none',380);
    loadData();
    return true;
  }
  return false;
});

// Admin passcode overlay (4-digit)
function openAdminPC(){
  if(sessionStorage.getItem(AK)==='1'){ toast('Already in Admin mode'); return; }
  window['_entry_ad']='';
  updateDots('ad',4,'');
  buildGrid('adm-grid','ad',4,(val)=>{
    if(val===PC_ADMIN){
      sessionStorage.setItem(AK,'1');
      showAdminUI();
      closeAdminPC();
      toast('Admin mode activated');
      render();
      return true;
    }
    return false;
  });
  document.getElementById('admin-pc').style.display='flex';
}

function closeAdminPC(){document.getElementById('admin-pc').style.display='none';}

function showAdminUI(){
  document.getElementById('adm-badge').style.display='flex';
  document.getElementById('adm-btn').style.display='none';
}

// ── DATA ─────────────────────────────────────────────────────
function flatten(raw){
  const out=[];
  raw.forEach(e=>{
    if(Array.isArray(e.findings)){
      e.findings.forEach(f=>out.push({
        _id:e.id, timestamp:e.timestamp, date:e.date||'', time:e.time||'',
        aircraft:e.aircraft||'', reporter:e.reporter||'',
        category:(f.category||'').trim(), subCategory:(f.subCategory||'').trim(),
        description:(f.description||'').trim(), remarks:(f.remarks||'').trim(),
        photoUrl:f.photoUrl||''
      }));
    }else{out.push(e);}
  });
  return out;
}

async function loadData(){
  document.getElementById('tcon').innerHTML='<div class="loading"><div class="sp"></div><p>Loading...</p></div>';
  try{
    // Use API directly — no cache issues
    const res=await fetch(GH_API,{headers:GH_H});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const d=await res.json();
    fileSha=d.sha;
    const raw=JSON.parse(atob(d.content.replace(/\n/g,'')));
    allData=flatten(raw).sort((a,b)=>new Date(b.timestamp||0)-new Date(a.timestamp||0));
    populateFilters(); applyFilter();
  }catch(e){
    document.getElementById('tcon').innerHTML=`<div class="empty">⚠️ ${e.message}</div>`;
  }
}

async function saveRaw(newRaw){
  try {
    // Get current SHA if not cached
    if(!fileSha){
      const rg=await fetch(GH_API,{headers:GH_H});
      if(rg.ok){ const dg=await rg.json(); fileSha=dg.sha; }
    }
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(newRaw,null,2))));
    const body={message:'Update findings',content,branch:GH_BRANCH,sha:fileSha};
    const rp=await fetch(GH_API,{method:'PUT',headers:GH_H,body:JSON.stringify(body)});
    if(!rp.ok){ const err=await rp.json(); throw new Error(err.message||'Save failed'); }
    const dp=await rp.json();
    if(dp.content) fileSha=dp.content.sha;
  } catch(e) {
    console.error('saveRaw error:', e);
    throw e;
  }
}

// ── FILTERS ──────────────────────────────────────────────────
function populateFilters(){
  const u=(id,arr,lbl)=>{document.getElementById(id).innerHTML=`<option value="">${lbl}</option>`+arr.map(v=>`<option>${v}</option>`).join('');}
  u('f-cat',[...new Set(allData.map(f=>f.category).filter(Boolean))].sort(),'All Categories');
  u('f-ac', [...new Set(allData.map(f=>f.aircraft).filter(Boolean))].sort(),'All Aircraft');
  u('f-rep',[...new Set(allData.map(f=>f.reporter).filter(Boolean))].sort(),'All Reporters');
}

function applyFilter(){
  const q=document.getElementById('q').value.toLowerCase();
  const cat=document.getElementById('f-cat').value;
  const ac=document.getElementById('f-ac').value;
  const rep=document.getElementById('f-rep').value;
  const fr=document.getElementById('f-fr').value;
  const to=document.getElementById('f-to').value;
  filtered=allData.filter(f=>{
    const mQ=!q||[f.description,f.reporter,f.aircraft,f.category,f.remarks].some(v=>v&&v.toLowerCase().includes(q));
    const ts=f.timestamp?new Date(f.timestamp):null;
    return mQ&&(!cat||f.category===cat)&&(!ac||f.aircraft===ac)&&(!rep||f.reporter===rep)&&(!fr||(ts&&ts>=new Date(fr)))&&(!to||(ts&&ts<=new Date(to+'T23:59:59')));
  });
  const g=v=>sCol==='timestamp'?(v.timestamp||''):((v[sCol]||'').toLowerCase());
  filtered.sort((a,b)=>sDir==='asc'?(g(a)>g(b)?1:-1):(g(a)<g(b)?1:-1));
  pg=1;
  document.getElementById('cnt').textContent=filtered.length+' findings';
  render(); renderPg(); updSortUI();
}

function resetF(){['q','f-cat','f-ac','f-rep','f-fr','f-to'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';}); applyFilter();}

// ── SORT ─────────────────────────────────────────────────────
function sortBy(col){
  sDir=(sCol===col&&sDir==='asc')?'desc':'asc';
  if(sCol!==col){sCol=col;sDir=col==='timestamp'?'desc':'asc';}
  applyFilter();
}
function updSortUI(){
  document.querySelectorAll('th').forEach(t=>t.classList.remove('asc','desc'));
  const t=document.getElementById('th-'+sCol);if(t)t.classList.add(sDir);
}

// ── RENDER ───────────────────────────────────────────────────
function fmt(ts){if(!ts)return '—';const d=new Date(ts);return isNaN(d)?ts:d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});}

function render(){
  const isAdmin=sessionStorage.getItem(AK)==='1';
  const rows=filtered.slice((pg-1)*perPg,pg*perPg);
  if(!rows.length){document.getElementById('tcon').innerHTML='<div class="empty">No findings match.</div>';return;}
  const admTh=isAdmin?'<th style="width:75px">Actions</th>':'';
  const cbTh=isAdmin?`<th class="cb-cell"><input type="checkbox" class="row-cb" id="cb-all" onclick="toggleAll(this)"></th>`:'';
  const body=rows.map((f,i)=>{
    const idx=(pg-1)*perPg+i;
    const ph=f.photoUrl?f.photoUrl.split(' | ').map(u=>`<img class="ph" src="${u}" onclick="showLB('${u}')" onerror="this.style.display='none'">`).join(''):'—';
    const admTd=isAdmin?`<td><button class="rb e" onclick="inlineEdit(${idx},this)">Edit</button><button class="rb d" onclick="delRow(${idx})">Del</button></td>`:'';
    const cbTd=isAdmin?`<td class="cb-cell"><input type="checkbox" class="row-cb" data-idx="${idx}" onchange="toggleSel(this)" ${selected.has(f._id+'_'+f.timestamp)?'checked':''}></td>`:'';
    return `<tr>
      <td onclick="cp(this)">${fmt(f.timestamp)}</td>
      <td onclick="cp(this)">${f.time||'—'}</td>
      <td onclick="cp(this)">${f.aircraft||'—'}</td>
      <td onclick="cp(this)">${f.reporter||'—'}</td>
      <td onclick="cp(this)"><span class="cat">${f.category||'—'}</span></td>
      <td onclick="cp(this)">${f.subCategory||'—'}</td>
      <td onclick="cp(this)">${f.description||'—'}</td>
      <td onclick="cp(this)">${f.remarks||'—'}</td>
      <td>${ph}</td>
      ${cbTd||''}${admTd}</tr>`;
  }).join('');
  document.getElementById('tcon').innerHTML=`<table>
    <thead><tr>
      ${cbTh}
      <th id="th-timestamp" onclick="sortBy('timestamp')">Date<span class="sa"></span></th>
      <th>Time</th>
      <th id="th-aircraft" onclick="sortBy('aircraft')">Aircraft<span class="sa"></span></th>
      <th id="th-reporter" onclick="sortBy('reporter')">By<span class="sa"></span></th>
      <th id="th-category" onclick="sortBy('category')">Category<span class="sa"></span></th>
      <th>Sub-Cat</th>
      <th id="th-description" onclick="sortBy('description')">Description<span class="sa"></span></th>
      <th>Remarks</th>
      <th>Photo</th>
      ${admTh}
    </tr></thead>
    <tbody>${body}</tbody>
  </table>`;
  applyFs(); initResize(); updSortUI();
}

function renderPg(){
  const tot=Math.ceil(filtered.length/perPg);
  if(tot<=1){document.getElementById('pgr').innerHTML='';return;}
  let h='';
  const s=Math.max(1,pg-2),e=Math.min(tot,pg+2);
  if(s>1) h+=`<button class="pb" onclick="goPg(1)">1</button>`;
  if(s>2) h+=`<span class="pi">…</span>`;
  for(let i=s;i<=e;i++) h+=`<button class="pb${i===pg?' on':''}" onclick="goPg(${i})">${i}</button>`;
  if(e<tot-1) h+=`<span class="pi">…</span>`;
  if(e<tot) h+=`<button class="pb" onclick="goPg(${tot})">${tot}</button>`;
  h+=`<span class="pi">${filtered.length} findings</span>`;
  document.getElementById('pgr').innerHTML=h;
}
function goPg(n){pg=n;render();renderPg();window.scrollTo(0,0);}

// ── FONT ────────────────────────────────────────────────────
function chgFont(d){fontSize=Math.max(9,Math.min(16,fontSize+d));localStorage.setItem('acft_fs',fontSize);applyFs();toast('Font: '+fontSize+'px');}
function applyFs(){document.querySelectorAll('td').forEach(t=>t.style.fontSize=fontSize+'px');}

// ── COL RESIZE ───────────────────────────────────────────────
function initResize(){
  document.querySelectorAll('th').forEach((th,i)=>{
    if(colW[i]) th.style.width=colW[i]+'px';
    const old=th.querySelector('.cr');if(old)old.remove();
    const r=document.createElement('div');r.className='cr';th.appendChild(r);
    let x0,w0;
    r.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();x0=e.pageX;w0=th.offsetWidth;r.classList.add('on');
      document.body.style.cssText='cursor:col-resize;user-select:none';
      const mv=e2=>{th.style.width=Math.max(40,w0+(e2.pageX-x0))+'px';colW[i]=parseInt(th.style.width);};
      const up=()=>{r.classList.remove('on');document.body.style.cssText='';localStorage.setItem('acft_cw',JSON.stringify(colW));document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
    r.addEventListener('dblclick',e=>{e.stopPropagation();th.style.width='';delete colW[i];localStorage.setItem('acft_cw',JSON.stringify(colW));});
  });
}

// ── INLINE EDIT (Excel style) ────────────────────────────────
function inlineEdit(idx,btn){
  const f=filtered[idx];
  const row=btn.closest('tr');
  const cells=row.querySelectorAll('td');
  // Save original values
  const originals=[];
  [4,5,6,7].forEach(ci=>originals.push(cells[ci].innerText.trim()));
  // Make cells editable
  [4,5,6,7].forEach((ci,j)=>{
    const td=cells[ci];
    const orig=originals[j];
    td.classList.add('editing');
    const inp=ci===6||ci===7?document.createElement('textarea'):document.createElement('input');
    inp.value=orig==='—'?'':orig;
    if(ci===6||ci===7){inp.rows=2;inp.style.minHeight='52px';}
    td.innerHTML='';td.appendChild(inp);
    if(j===0) inp.focus();
  });
  // Change Edit button to Save/Cancel
  btn.className='rb s';btn.textContent='Save';
  btn.onclick=()=>saveInline(idx,row,f);
  const cancelBtn=btn.nextElementSibling;
  cancelBtn.className='rb x';cancelBtn.textContent='✕';
  cancelBtn.onclick=()=>{render();};
}

async function saveInline(idx,row,f){
  const cells=row.querySelectorAll('td');
  const newCat=cells[4].querySelector('input,textarea')?.value.trim()||f.category;
  const newSub=cells[5].querySelector('input,textarea')?.value.trim()||f.subCategory;
  const newDesc=cells[6].querySelector('input,textarea')?.value.trim()||f.description;
  const newRem=cells[7].querySelector('input,textarea')?.value.trim()||f.remarks;
  // Update in allData
  const gi=allData.findIndex(x=>x._id===f._id&&x.timestamp===f.timestamp&&x.description===f.description);
  if(gi!==-1){
    allData[gi].category=newCat; allData[gi].subCategory=newSub;
    allData[gi].description=newDesc; allData[gi].remarks=newRem;
  }
  try{await saveRaw(allData);toast('Saved ✓');applyFilter();}
  catch(e){toast('Save failed');}
}

// ── CHECKBOX SELECTION ───────────────────────────────────────
function toggleSel(cb){
  const idx=parseInt(cb.dataset.idx);
  const f=filtered[idx];
  if(!f) return;
  const key=f._id+'_'+f.timestamp;
  if(cb.checked) selected.add(key); else selected.delete(key);
  updateDelBtn();
}

function toggleAll(cb){
  const rows=filtered.slice((pg-1)*perPg,pg*perPg);
  rows.forEach(f=>{
    const key=f._id+'_'+f.timestamp;
    if(cb.checked) selected.add(key); else selected.delete(key);
  });
  document.querySelectorAll('.row-cb:not(#cb-all)').forEach(c=>c.checked=cb.checked);
  updateDelBtn();
}

function updateDelBtn(){
  const btn=document.getElementById('del-sel-btn');
  const cnt=document.getElementById('del-sel-count');
  if(!btn) return;
  if(selected.size>0){
    btn.style.display='flex';
    cnt.textContent='Delete ('+selected.size+')';
  } else {
    btn.style.display='none';
  }
}

// ── DELETE MODAL ──────────────────────────────────────────────
var _delFn=null;

function openDelModal(msg, fn){
  document.getElementById('del-msg').textContent=msg;
  _delFn=fn;
  document.getElementById('del-modal').style.display='flex';
}

function closeDelModal(){
  document.getElementById('del-modal').style.display='none';
  _delFn=null;
}

function confirmDelete(){
  const fn = _delFn;
  closeDelModal();
  if(fn) fn();
}

function delRow(idx){
  const f=filtered[idx];
  const desc=(f.description||'').slice(0,60);
  openDelModal(
    'Delete this finding?'+(desc?'\n"'+desc+'"':''),
    async ()=>{
      const gi=allData.findIndex(x=>x._id===f._id&&x.timestamp===f.timestamp&&x.description===f.description);
      if(gi!==-1) allData.splice(gi,1);
      try{ await saveRaw(allData); toast('Deleted ✓'); applyFilter(); selected.clear(); updateDelBtn(); }
      catch(e){ toast('Delete failed'); }
    }
  );
}

function deleteSelected(){
  const n=selected.size;
  if(!n) return;
  openDelModal(
    'Delete '+n+' finding'+(n>1?'s':'')+' permanently?',
    async ()=>{
      allData=allData.filter(f=>!selected.has(f._id+'_'+f.timestamp));
      selected.clear(); updateDelBtn();
      try{ await saveRaw(allData); toast('Deleted '+n+' findings ✓'); applyFilter(); }
      catch(e){ toast('Delete failed'); }
    }
  );
}

// ── COPY ────────────────────────────────────────────────────
function cp(td){const txt=td.innerText.trim();if(!txt||txt==='—')return;navigator.clipboard.writeText(txt).catch(()=>{});td.classList.add('copied');toast('Copied ✓');setTimeout(()=>td.classList.remove('copied'),700);}

// ── PHOTO ────────────────────────────────────────────────────
function showLB(u){document.getElementById('lb-img').src=u;document.getElementById('lb').style.display='flex';}

// ── EXPORT ───────────────────────────────────────────────────
function doExcelExport(){
  const data=filtered.map(f=>({'Date':fmt(f.timestamp),'Time':f.time||'','Aircraft':f.aircraft||'','By':f.reporter||'','Category':f.category||'','Sub-Cat':f.subCategory||'','Description':f.description||'','Remarks':f.remarks||'','Photo':f.photoUrl||''}));
  const ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:11},{wch:7},{wch:10},{wch:18},{wch:15},{wch:15},{wch:48},{wch:24},{wch:38}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Findings');
  XLSX.writeFile(wb,'ACFT_Findings_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Exported '+data.length+' findings ✓');
}

function doPDFExport(){
  const ds=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const rows=filtered.map((f,i)=>`<tr style="background:${i%2===0?'#f8faf8':'#fff'}"><td>${fmt(f.timestamp)}</td><td>${f.aircraft||'—'}</td><td style="background:#d6ead8;color:#1a5c3a;padding:2px 5px;border-radius:3px;font-size:9px;white-space:nowrap">${f.category||'—'}</td><td>${(f.description||'').slice(0,120)}</td><td>${f.reporter||'—'}</td>${f.photoUrl?`<td><img src="${f.photoUrl.split(' | ')[0]}" style="width:52px;height:35px;object-fit:cover;border-radius:3px"></td>`:'<td>—</td>'}</tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>ACFT Findings</title><style>body{font-family:Arial,sans-serif;font-size:10px;margin:14px}.h{background:#0F2920;color:#fff;padding:11px 15px;border-radius:6px;margin-bottom:13px;display:flex;justify-content:space-between}table{width:100%;border-collapse:collapse}th{background:#0F2920;color:#fff;padding:5px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.7px}td{padding:5px 8px;border-bottom:1px solid #e2e5df;vertical-align:top}.ft{margin-top:13px;font-size:9px;color:#9aa098;text-align:center}</style></head><body><div class="h"><b>ACFT FINDINGS REPORT</b><span>${ds} | ${filtered.length} findings</span></div><table><thead><tr><th>Date</th><th>Aircraft</th><th>Category</th><th>Description</th><th>Reporter</th><th>Photo</th></tr></thead><tbody>${rows}</tbody></table><div class="ft">SAUDIA TECHNIC — CA&QC DIVISION</div><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

// ── TOAST ────────────────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── INIT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem(SK)==='1'){
    document.getElementById('pc').style.display='none';
    if(sessionStorage.getItem(AK)==='1') showAdminUI();
    loadData();
  }
});
</script>
