name: Sync to Mirror Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to mirror (avisuite)
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -f CNAME
          git add -A
          git commit -m "Remove CNAME for mirror" --allow-empty

          git remote add mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/Aviproject-bit/avisuite.git"
          git push mirror HEAD:main --force
